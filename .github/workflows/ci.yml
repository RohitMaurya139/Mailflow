name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    # Real Redis for the rate-limiter integration tests (RUN_REDIS_TESTS=1).
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Unit tests
        run: pnpm test

      # Cache the mongod binary that mongodb-memory-server downloads on first run.
      - name: Cache MongoDB binaries
        uses: actions/cache@v4
        with:
          path: ~/.cache/mongodb-binaries
          key: mongodb-binaries-${{ runner.os }}

      - name: Integration tests
        run: pnpm test:integration
        env:
          # MONGODB_URI comes from mongodb-memory-server; AUTH_SECRET/ENCRYPTION_KEY
          # are generated by the test global-setup when unset.
          RUN_REDIS_TESTS: '1'
          REDIS_URL: redis://localhost:6379

      - name: Typecheck worker
        run: pnpm --filter @mailflow/worker exec tsc --noEmit

      - name: Build web (typechecks + bundles)
        run: pnpm --filter @mailflow/web build
        env:
          # Placeholder values so the build can evaluate config at import time.
          # Real secrets are provided by the hosting platform at runtime.
          NODE_ENV: production
          MONGODB_URI: mongodb://localhost:27017/mailflow
          REDIS_URL: redis://localhost:6379
          AUTH_SECRET: ci-placeholder-auth-secret-0123456789
          ENCRYPTION_KEY: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
          APP_URL: http://localhost:3000
